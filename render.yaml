services:
  - type: web
    name: sistema-pedidos-api
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-pedidos-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://seu-frontend.onrender.com

databases:
  - name: sistema-pedidos-db
    databaseName: sistema_pedidos
    plan: free